<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محل الفاجر | Mahal Al-Fajer</title>
    
    <!-- Google Fonts: Outfit (Modern, Premium) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar glass">
        <div class="logo">محل الفاجر</div>
        <div class="nav-actions">
            <button id="theme-toggle" class="icon-btn" aria-label="تبديل الوضع">
                <!-- Sun/Moon icons will be handled by CSS/JS -->
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <button id="cart-btn" class="icon-btn" aria-label="السلة">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="cart-count">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero / Banner -->
    <header class="hero">
        <div class="hero-content glass">
            <h1>محل الفاجر</h1>
            <p>أناقة لا تضاهى. جودة عالية.</p>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <section id="products-grid" class="products-container">
            <!-- Products will be injected here via JS -->
            <div class="empty-state">
                <p>لا توجد منتجات حالياً.</p>
            </div>
        </section>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>سلة المشتريات</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="cart-items">
                <!-- Cart items here -->
                <p class="empty-text">السلة فارغة</p>
            </div>
            <div class="cart-footer">
                <div class="total">المجموع: <span id="cart-total">0</span> ج.م</div>
                <!-- Secret Admin Trigger -->
                <button id="admin-trigger" class="secret-btn" title="Admin Login">.</button>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard Modal -->
    <div id="admin-modal" class="modal hidden">
        <div class="modal-content glass admin-panel">
            <div class="modal-header">
                <h2>لوحة التحكم (Admin)</h2>
                <button class="close-btn admin-close">&times;</button>
            </div>
            <form id="add-product-form">
                <div class="form-group">
                    <label>صورة المنتج (رابط أو ملف)</label>
                    <input type="file" id="product-image-file" accept="image/*">
                    <!-- Or URL input if preferred later -->
                </div>
                <div class="form-group">
                    <label>اسم المنتج</label>
                    <input type="text" id="product-name" required placeholder="مثال: تيشيرت أسود">
                </div>
                <div class="form-group">
                    <label>السعر (ج.م)</label>
                    <input type="number" id="product-price" required placeholder="0">
                </div>
                <button type="submit" class="btn-primary">إضافة المنتج</button>
            </form>
            <div id="upload-status"></div>
        </div>
    </div>

    <!-- Firebase SDKs (Compat version for simplicity in static sites) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <!-- App Logic -->
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
